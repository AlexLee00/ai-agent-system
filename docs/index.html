<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent System Pages</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f2ea;
        --fg: #1f2a2e;
        --muted: #66757f;
        --card: #fffdf8;
        --line: #ddd4c6;
        --accent: #0b7a75;
      }
      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background: radial-gradient(circle at top, #fffaf0, var(--bg));
        color: var(--fg);
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 56px 20px 72px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 36px;
        line-height: 1.15;
      }
      p {
        line-height: 1.65;
        color: var(--muted);
      }
      .card {
        margin-top: 28px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--card);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #f0ece3;
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Agent System Pages</h1>
      <p>
        이 페이지는 블로그팀 인스타 릴스 같은 공개 자산을 안정적으로 서빙하기 위한 GitHub Pages 루트입니다.
      </p>
      <div class="card">
        <p>
          현재 공개 자산 기본 경로는
          <code>/blog-assets/instagram/</code>
          입니다.
        </p>
        <p>
          예시 경로:
          <a href="./blog-assets/instagram/">blog-assets/instagram/</a>
        </p>
      </div>
    </main>
  </body>
</html>
