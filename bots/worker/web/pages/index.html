<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>워커팀 로그인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 24px; color: #1a1a2e; }
    .logo p  { font-size: 14px; color: #666; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #4f46e5; }
    input[aria-invalid="true"] { border-color: #ef4444; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover  { background: #4338ca; }
    .btn:active { background: #3730a3; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    @media (max-width: 440px) { .card { margin: 16px; padding: 28px 20px; } }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="logo">
        <h1>💼 워커팀</h1>
        <p>AI Agent System — Worker</p>
      </div>

      <div class="error" id="errorBox" role="alert" aria-live="polite"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">아이디</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            aria-label="아이디 입력"
            aria-required="true"
            tabindex="1"
            required
          >
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            aria-label="비밀번호 입력"
            aria-required="true"
            tabindex="2"
            required
          >
        </div>
        <button type="submit" class="btn" tabindex="3" id="submitBtn">로그인</button>
      </form>
    </div>
  </main>

  <script>
    const form      = document.getElementById('loginForm');
    const errorBox  = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }
    function hideError() { errorBox.classList.remove('show'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) { showError('아이디와 비밀번호를 입력하세요.'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = '로그인 중...';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include',
        });
        const data = await res.json();

        if (!res.ok) { showError(data.error || '로그인에 실패했습니다.'); return; }

        // httpOnly 쿠키는 Set-Cookie 헤더로 설정 불가 (클라이언트 측)
        // localStorage 저장 후 대시보드로 이동 (개발 환경)
        sessionStorage.setItem('wt', data.token);
        window.location.href = '/dashboard.html';
      } catch {
        showError('서버에 연결할 수 없습니다. 잠시 후 다시 시도하세요.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
