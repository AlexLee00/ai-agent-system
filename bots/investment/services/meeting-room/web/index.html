<html lang="ko">

  <title>Luna Meeting Room</title>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <style>
    :root {
      --ink: #17211a;
      --muted: #64705f;
      --line: rgba(23, 33, 26, 0.14);
      --paper: rgba(255, 252, 241, 0.86);
      --panel: rgba(247, 242, 222, 0.76);
      --sage: #486d4a;
      --amber: #bc7a22;
      --red: #9c4238;
      --blue: #365f7a;
      --shadow: 0 24px 70px rgba(51, 62, 38, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(188, 122, 34, 0.24), transparent 30%),
        radial-gradient(circle at 85% 12%, rgba(54, 95, 122, 0.22), transparent 26%),
        linear-gradient(135deg, #f8f0dc 0%, #e5ecd9 52%, #dce8e7 100%);
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: #fffaf0;
      padding: 10px 16px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(23, 33, 26, 0.18);
    }
    button.secondary { background: rgba(23, 33, 26, 0.08); color: var(--ink); box-shadow: none; }
    button.warn { background: var(--amber); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    a:focus-visible,
    summary:focus-visible {
      outline: 3px solid rgba(54, 95, 122, 0.92);
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgba(54, 95, 122, 0.16);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.55);
      color: var(--ink);
      padding: 10px 12px;
    }
    textarea { min-height: 120px; resize: vertical; }
    pre {
      max-width: 100%;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    details:not([open]) > :not(summary) {
      display: none;
    }
    summary {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 10px;
      border-radius: 12px;
      cursor: pointer;
    }
    .evidence-summary {
      display: grid;
      gap: 6px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .markdown-lite {
      white-space: normal;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.68;
    }
    .markdown-lite h3,
    .markdown-lite h4 {
      margin: 10px 0 6px;
      letter-spacing: -0.02em;
    }
    .markdown-lite h3 { font-size: 16px; }
    .markdown-lite h4 { font-size: 14px; color: var(--muted); }
    .markdown-lite ul { margin: 6px 0 8px; padding-left: 20px; }
    .markdown-lite .markdown-line { min-height: 1.4em; }
    .markdown-lite b { font-weight: 800; color: var(--ink); }
    .markdown-table {
      max-width: 100%;
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      margin: 8px 0;
      overflow: hidden;
      border-radius: 12px;
      font-size: 12px;
    }
    .markdown-table th,
    .markdown-table td {
      border: 1px solid var(--line);
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
      background: rgba(255, 255, 255, 0.38);
    }
    .markdown-table th {
      background: rgba(72, 109, 74, 0.14);
      font-weight: 800;
    }
    .shell { padding: 28px; }
    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .hero h1 {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: clamp(34px, 5vw, 62px);
      letter-spacing: -0.05em;
    }
    .hero p { margin: 8px 0 0; color: var(--muted); max-width: 760px; }
    .token-box { min-width: 260px; }
    .topline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      min-height: 40px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dashboard-link {
      text-transform: none;
      letter-spacing: normal;
    }
    .tabs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .tab-switcher { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs button { background: rgba(255,255,255,0.48); color: var(--ink); box-shadow: none; border: 1px solid var(--line); }
    .tabs button.active { background: var(--ink); color: #fffaf0; }
    .pwa-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 18px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 252, 241, 0.62);
    }
    .pwa-controls.compact {
      justify-content: flex-end;
      padding: 0;
      border: 0;
      background: transparent;
    }
    .pwa-copy {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 280px minmax(360px, 1fr) 360px;
      gap: 16px;
    }
    .meeting-main { min-width: 0; }
    .mobile-action-bar,
    .mobile-drawer-header,
    .drawer-backdrop {
      display: none;
    }
    .live-stream-panel {
      display: grid;
      gap: 12px;
      margin: 0 0 16px;
      padding: 14px;
      border: 1px solid rgba(54, 95, 122, 0.2);
      border-radius: 22px;
      background: rgba(255, 252, 241, 0.66);
      box-shadow: 0 14px 44px rgba(51, 62, 38, 0.12);
    }
    .live-stream-panel.active {
      border-color: rgba(72, 109, 74, 0.34);
      background: rgba(224, 239, 207, 0.58);
    }
    .live-stream-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .live-stream-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .live-stream-status {
      width: fit-content;
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.55);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .live-stream-copy {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.5;
    }
    .live-stream-events {
      display: grid;
      gap: 8px;
    }
    .live-stream-typing {
      display: grid;
      gap: 7px;
      min-height: 92px;
      border-radius: 16px;
      padding: 12px;
      border: 1px solid rgba(72, 109, 74, 0.22);
      background: rgba(255, 255, 255, 0.58);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }
    .live-stream-speaker {
      color: var(--sage);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }
    .live-stream-typed {
      font-size: 14px;
      font-weight: 780;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }
    .typing-cursor {
      display: inline-block;
      width: 7px;
      height: 1.15em;
      margin-left: 2px;
      border-right: 2px solid var(--sage);
      vertical-align: -0.18em;
      animation: typingCursorBlink 0.85s steps(1) infinite;
    }
    @keyframes typingCursorBlink {
      0%, 52% { opacity: 1; }
      53%, 100% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .typing-cursor { animation: none; }
    }
    .live-stream-event {
      border-radius: 14px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .ask-grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
    .polling-status {
      display: inline-flex;
      align-items: center;
      margin: 0 0 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.52);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .schedule-status {
      display: block;
      width: fit-content;
      max-width: 100%;
      margin: -4px 0 12px;
      padding: 8px 11px;
      border-radius: 16px;
      border: 1px solid rgba(54, 95, 122, 0.22);
      background: rgba(54, 95, 122, 0.08);
      color: #25485f;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.45;
    }
    .jaenong-brief-card {
      display: grid;
      gap: 12px;
      margin: 0 0 16px;
      padding: 16px 18px;
      border: 1px solid rgba(188, 122, 34, 0.28);
      border-radius: 22px;
      background:
        linear-gradient(115deg, rgba(255, 243, 199, 0.78), rgba(255, 252, 241, 0.8)),
        var(--paper);
      box-shadow: 0 16px 44px rgba(83, 61, 24, 0.12);
    }
    .jaenong-brief-card.ignored {
      grid-template-columns: 1fr auto;
      align-items: center;
      background: rgba(255, 252, 241, 0.56);
    }
    .jaenong-brief-head,
    .jaenong-actions,
    .jaenong-brief-meta,
    .jaenong-symbols {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .jaenong-brief-head { justify-content: space-between; align-items: start; }
    .jaenong-brief-head h2 { margin: 3px 0 0; font-size: 18px; letter-spacing: -0.025em; }
    .jaenong-kicker {
      color: #7c4f00;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .jaenong-state,
    .jaenong-brief-meta span,
    .jaenong-symbols span {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(255, 255, 255, 0.54);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .jaenong-state.awaiting_ack { color: #7c4f00; border-color: rgba(196, 127, 20, 0.38); }
    .jaenong-state.active { color: #315f34; border-color: rgba(72, 109, 74, 0.36); }
    .jaenong-state.expired,
    .jaenong-state.invalid,
    .jaenong-state.parse_failed { color: #8f1d1d; border-color: rgba(201, 68, 68, 0.36); }
    .jaenong-actions { justify-content: flex-end; }
    .jaenong-safety {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.45;
    }
    .card {
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card h2 {
      margin: 0;
      padding: 18px 18px 10px;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
    }
    .card-body { padding: 16px 18px 20px; }
    .list { display: grid; gap: 10px; }
    .segment-status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .manual-start-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }
    .segment-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
    }
    .segment-pill.active {
      color: #315f34;
      border-color: rgba(72, 109, 74, 0.32);
      background: rgba(224, 239, 207, 0.55);
    }
    .segment-pill.closed {
      color: #8f1d1d;
      border-color: rgba(201, 68, 68, 0.35);
      background: rgba(255, 110, 110, 0.16);
    }
    .llm-mode {
      width: fit-content;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid var(--line);
    }
    .llm-mode.disabled {
      color: #315f34;
      border-color: rgba(72, 109, 74, 0.32);
      background: rgba(224, 239, 207, 0.58);
    }
    .llm-mode.enabled {
      color: #7c4f00;
      border-color: rgba(196, 127, 20, 0.35);
      background: rgba(255, 199, 92, 0.22);
    }
    .ask-safety-note {
      margin: -2px 0 10px;
      border-radius: 14px;
      padding: 8px 10px;
      color: #4f3512;
      background: rgba(255, 199, 92, 0.16);
      border: 1px solid rgba(196, 127, 20, 0.25);
      font-size: 12px;
      font-weight: 800;
    }
    .ask-helper {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-top: -2px;
    }
    .ask-suggestions {
      display: grid;
      gap: 7px;
      margin: -2px 0 12px;
    }
    .ask-suggestion-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    button.ask-suggestion {
      min-height: 36px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 800;
      text-align: left;
      white-space: normal;
    }
    .meeting-item, .decision-card, .minute {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.42);
    }
    .meeting-list-row .meeting-item {
      width: 100%;
      text-align: left;
    }
    .meeting-item.active { border-color: var(--sage); background: rgba(224, 239, 207, 0.68); }
    .meeting-title { font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .due {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 800;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.52);
      color: var(--muted);
    }
    .due.soon {
      color: #7c4f00;
      border-color: rgba(196, 127, 20, 0.35);
      background: rgba(255, 199, 92, 0.2);
    }
    .due.unknown {
      color: var(--red);
      border-color: rgba(156, 66, 56, 0.26);
      background: rgba(156, 66, 56, 0.1);
    }
    .due.overdue {
      color: #8f1d1d;
      border-color: rgba(201, 68, 68, 0.35);
      background: rgba(255, 110, 110, 0.18);
    }
    .minute { border-left: 5px solid var(--muted); }
    .minute.data { border-left-color: var(--blue); }
    .minute.analysis { border-left-color: var(--sage); }
    .minute.grill { border-left-color: var(--amber); }
    .minute.decision { border-left-color: var(--red); }
    .minute.adr { border-left-color: #5d4a2f; background: rgba(188, 122, 34, 0.1); }
    .role-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 12px;
    }
    .role-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .role-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--muted);
    }
    .role-dot.data { background: var(--blue); }
    .role-dot.analysis { background: var(--sage); }
    .role-dot.grill { background: var(--amber); }
    .role-dot.decision { background: var(--red); }
    .role-dot.adr { background: #5d4a2f; }
    .catchup {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(72, 109, 74, 0.13);
      margin-bottom: 12px;
    }
    .catchup [role="list"] {
      display: grid;
      gap: 8px;
    }
    .meeting-lifecycle {
      display: grid;
      gap: 10px;
      margin: 0 0 12px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(54, 95, 122, 0.18);
      background: rgba(54, 95, 122, 0.08);
    }
    .lifecycle-steps {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .lifecycle-step {
      display: grid;
      gap: 4px;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.46);
    }
    .lifecycle-step.complete {
      border-color: rgba(72, 109, 74, 0.32);
      background: rgba(224, 239, 207, 0.55);
    }
    .lifecycle-step.failed {
      border-color: rgba(156, 66, 56, 0.32);
      background: rgba(156, 66, 56, 0.1);
    }
    .lifecycle-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .lifecycle-value {
      font-size: 13px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }
    .lifecycle-feedback,
    .lifecycle-impact {
      color: var(--ink);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .lifecycle-impact {
      color: var(--muted);
      font-size: 12px;
    }
    .decision-state {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .decision-state span {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(23, 33, 26, 0.07);
    }
    .decision-question {
      font-size: 16px;
      font-weight: 850;
      line-height: 1.35;
      letter-spacing: -0.02em;
      overflow-wrap: anywhere;
    }
    .decision-context,
    .decision-effects {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .decision-effects {
      border-radius: 14px;
      padding: 10px;
      background: rgba(72, 109, 74, 0.1);
      border: 1px solid rgba(72, 109, 74, 0.18);
    }
    .safety-label,
    .reappeared-badge {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }
    .safety-label {
      margin-top: 10px;
      color: #315f34;
      background: rgba(224, 239, 207, 0.66);
      border: 1px solid rgba(72, 109, 74, 0.32);
    }
    .reappeared-badge {
      color: #7c4f00;
      background: rgba(255, 199, 92, 0.2);
      border: 1px solid rgba(196, 127, 20, 0.35);
    }
    .decision-panel-body {
      padding-top: 12px;
    }
    .decision-header {
      display: flex;
      align-items: stretch;
      flex-direction: column;
      gap: 12px;
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.35);
    }
    .decision-scope-note {
      margin-top: 0;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .decision-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0;
      width: 100%;
      flex: 0 0 auto;
    }
    .timeline-groups {
      gap: 12px;
    }
    .timeline-group {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.35);
      padding: 8px;
    }
    .timeline-group > summary {
      display: grid;
      gap: 4px;
      width: 100%;
      align-items: start;
      overflow-wrap: anywhere;
    }
    .timeline-group-title {
      font-weight: 850;
      color: var(--ink);
    }
    .timeline-group-summary {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .timeline-group-body {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .live-event-list {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }
    .live-event {
      border-left: 5px solid var(--blue);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.52);
      padding: 12px;
      overflow-wrap: anywhere;
    }
    .live-event-decision { border-left-color: var(--red); }
    .live-event-error { border-left-color: var(--red); background: rgba(183, 73, 73, 0.08); }
    .live-event-analysis { border-left-color: var(--sage); }
    .text-button {
      width: auto;
      min-height: 34px;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
    }
    .full-text-panel {
      margin-top: 8px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(23, 33, 26, 0.06);
    }
    .agent-history {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }
    .agent-history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }
    .agent-history-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.38);
      padding: 10px;
      min-width: 0;
    }
    .score-graph {
      display: grid;
      gap: 8px;
      margin: 12px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.34);
    }
    .score-graph svg {
      width: 100%;
      max-width: 420px;
      height: auto;
    }
    .score-axis {
      fill: var(--muted);
      font-size: 10px;
    }
    .score-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .score-swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 99px;
      margin-right: 4px;
      vertical-align: -1px;
    }
    .score-empty {
      margin: 12px 0;
      color: var(--muted);
    }
    .replay-panel {
      display: grid;
      gap: 8px;
      margin: 12px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(23, 33, 26, 0.06);
    }
    .replay-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .replay-toolbar button {
      min-width: 88px;
    }
    .replay-events {
      display: grid;
      gap: 6px;
    }
    .replay-event {
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
      overflow-wrap: anywhere;
    }
    .form-row { display: grid; gap: 8px; margin-bottom: 12px; }
    .inline { display: flex; gap: 8px; align-items: center; }
    .inline > * { flex: 1; }
    .check { display: flex; gap: 8px; align-items: center; min-height: 40px; color: var(--muted); font-size: 13px; cursor: pointer; }
    .check input { width: 20px; height: 20px; flex: 0 0 20px; }
    .error { color: var(--red); }
    .notice {
      color: #315f34;
      background: rgba(224, 239, 207, 0.66);
      border: 1px solid rgba(72, 109, 74, 0.32);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 800;
    }
    .answer {
      border-radius: 22px;
      padding: 16px;
      background: rgba(23, 33, 26, 0.08);
      min-height: 180px;
    }
    @media (max-width: 1080px) {
      .grid, .ask-grid { grid-template-columns: 1fr; }
      .hero { align-items: start; flex-direction: column; }
      .token-box { min-width: 0; width: 100%; max-width: 100%; }
      .shell { padding: 16px; }
      .mobile-action-bar {
        position: sticky;
        top: 8px;
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 0 0 12px;
      }
      .mobile-action-bar button {
        min-height: 44px;
        padding: 10px 12px;
      }
      .panel-shell {
        position: fixed;
        top: 0;
        bottom: 0;
        z-index: 50;
        width: min(88vw, 390px);
        max-width: calc(100vw - 28px);
        padding: 14px;
        overflow-y: auto;
        background:
          radial-gradient(circle at 15% 10%, rgba(188, 122, 34, 0.2), transparent 34%),
          linear-gradient(145deg, #fff9e8 0%, #edf3e6 100%);
        box-shadow: 0 28px 80px rgba(23, 33, 26, 0.34);
        transition: transform 180ms ease;
      }
      .meeting-drawer {
        left: 0;
        border-radius: 0 24px 24px 0;
        transform: translateX(-106%);
      }
      .decision-drawer {
        right: 0;
        border-radius: 24px 0 0 24px;
        transform: translateX(106%);
      }
      .panel-shell.open {
        transform: translateX(0);
      }
      .mobile-drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 12px;
      }
      .mobile-drawer-header h2 {
        margin: 0;
        font-size: 16px;
        letter-spacing: -0.02em;
      }
      .mobile-drawer-header button {
        min-width: 68px;
        box-shadow: none;
      }
      .drawer-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 45;
        border-radius: 0;
        padding: 0;
        background: rgba(23, 33, 26, 0.42);
        box-shadow: none;
      }
      .live-stream-panel {
        border-radius: 18px;
      }
      .decision-header {
        align-items: stretch;
        flex-direction: column;
      }
      .decision-toolbar {
        justify-content: flex-start;
      }
      .lifecycle-steps {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/app.js"></script>
</body>
</html>
