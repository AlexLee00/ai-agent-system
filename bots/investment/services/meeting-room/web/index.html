<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://unpkg.com; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:;">
  <title>Luna Meeting Room</title>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  <style>
    :root {
      --ink: #17211a;
      --muted: #64705f;
      --line: rgba(23, 33, 26, 0.14);
      --paper: rgba(255, 252, 241, 0.86);
      --panel: rgba(247, 242, 222, 0.76);
      --sage: #486d4a;
      --amber: #bc7a22;
      --red: #9c4238;
      --blue: #365f7a;
      --shadow: 0 24px 70px rgba(51, 62, 38, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(188, 122, 34, 0.24), transparent 30%),
        radial-gradient(circle at 85% 12%, rgba(54, 95, 122, 0.22), transparent 26%),
        linear-gradient(135deg, #f8f0dc 0%, #e5ecd9 52%, #dce8e7 100%);
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: #fffaf0;
      padding: 10px 16px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(23, 33, 26, 0.18);
    }
    button.secondary { background: rgba(23, 33, 26, 0.08); color: var(--ink); box-shadow: none; }
    button.warn { background: var(--amber); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    a:focus-visible,
    summary:focus-visible {
      outline: 3px solid rgba(54, 95, 122, 0.92);
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgba(54, 95, 122, 0.16);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.55);
      color: var(--ink);
      padding: 10px 12px;
    }
    textarea { min-height: 120px; resize: vertical; }
    pre {
      max-width: 100%;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .markdown-lite {
      white-space: normal;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.68;
    }
    .markdown-lite h3,
    .markdown-lite h4 {
      margin: 10px 0 6px;
      letter-spacing: -0.02em;
    }
    .markdown-lite h3 { font-size: 16px; }
    .markdown-lite h4 { font-size: 14px; color: var(--muted); }
    .markdown-lite ul { margin: 6px 0 8px; padding-left: 20px; }
    .markdown-lite .markdown-line { min-height: 1.4em; }
    .markdown-lite b { font-weight: 800; color: var(--ink); }
    .markdown-table {
      max-width: 100%;
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      margin: 8px 0;
      overflow: hidden;
      border-radius: 12px;
      font-size: 12px;
    }
    .markdown-table th,
    .markdown-table td {
      border: 1px solid var(--line);
      padding: 7px 8px;
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
      background: rgba(255, 255, 255, 0.38);
    }
    .markdown-table th {
      background: rgba(72, 109, 74, 0.14);
      font-weight: 800;
    }
    .shell { padding: 28px; }
    .hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .hero h1 {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: clamp(34px, 5vw, 62px);
      letter-spacing: -0.05em;
    }
    .hero p { margin: 8px 0 0; color: var(--muted); max-width: 760px; }
    .topline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tabs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .tab-switcher { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs button { background: rgba(255,255,255,0.48); color: var(--ink); box-shadow: none; border: 1px solid var(--line); }
    .tabs button.active { background: var(--ink); color: #fffaf0; }
    .grid {
      display: grid;
      grid-template-columns: 280px minmax(360px, 1fr) 360px;
      gap: 16px;
    }
    .ask-grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
    .card {
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card h2 {
      margin: 0;
      padding: 18px 18px 10px;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
    }
    .card-body { padding: 16px 18px 20px; }
    .list { display: grid; gap: 10px; }
    .segment-status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .segment-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
    }
    .segment-pill.active {
      color: #315f34;
      border-color: rgba(72, 109, 74, 0.32);
      background: rgba(224, 239, 207, 0.55);
    }
    .segment-pill.closed {
      color: #8f1d1d;
      border-color: rgba(201, 68, 68, 0.35);
      background: rgba(255, 110, 110, 0.16);
    }
    .llm-mode {
      width: fit-content;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid var(--line);
    }
    .llm-mode.disabled {
      color: #315f34;
      border-color: rgba(72, 109, 74, 0.32);
      background: rgba(224, 239, 207, 0.58);
    }
    .llm-mode.enabled {
      color: #7c4f00;
      border-color: rgba(196, 127, 20, 0.35);
      background: rgba(255, 199, 92, 0.22);
    }
    .ask-safety-note {
      margin: -2px 0 10px;
      border-radius: 14px;
      padding: 8px 10px;
      color: #4f3512;
      background: rgba(255, 199, 92, 0.16);
      border: 1px solid rgba(196, 127, 20, 0.25);
      font-size: 12px;
      font-weight: 800;
    }
    .ask-helper {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-top: -2px;
    }
    .meeting-item, .decision-card, .minute {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.42);
    }
    .meeting-item.active { border-color: var(--sage); background: rgba(224, 239, 207, 0.68); }
    .meeting-title { font-weight: 700; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .due {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 800;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.52);
      color: var(--muted);
    }
    .due.soon {
      color: #7c4f00;
      border-color: rgba(196, 127, 20, 0.35);
      background: rgba(255, 199, 92, 0.2);
    }
    .due.unknown {
      color: var(--red);
      border-color: rgba(156, 66, 56, 0.26);
      background: rgba(156, 66, 56, 0.1);
    }
    .due.overdue {
      color: #8f1d1d;
      border-color: rgba(201, 68, 68, 0.35);
      background: rgba(255, 110, 110, 0.18);
    }
    .minute { border-left: 5px solid var(--muted); }
    .minute.data { border-left-color: var(--blue); }
    .minute.analysis { border-left-color: var(--sage); }
    .minute.grill { border-left-color: var(--amber); }
    .minute.decision { border-left-color: var(--red); }
    .minute.adr { border-left-color: #5d4a2f; background: rgba(188, 122, 34, 0.1); }
    .role-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 12px;
    }
    .role-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .role-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--muted);
    }
    .role-dot.data { background: var(--blue); }
    .role-dot.analysis { background: var(--sage); }
    .role-dot.grill { background: var(--amber); }
    .role-dot.decision { background: var(--red); }
    .role-dot.adr { background: #5d4a2f; }
    .catchup {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(72, 109, 74, 0.13);
      margin-bottom: 12px;
    }
    .decision-state {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .decision-state span {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(23, 33, 26, 0.07);
    }
    .form-row { display: grid; gap: 8px; margin-bottom: 12px; }
    .inline { display: flex; gap: 8px; align-items: center; }
    .inline > * { flex: 1; }
    .check { display: flex; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; }
    .check input { width: auto; }
    .error { color: var(--red); }
    .notice {
      color: #315f34;
      background: rgba(224, 239, 207, 0.66);
      border: 1px solid rgba(72, 109, 74, 0.32);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 800;
    }
    .answer {
      border-radius: 22px;
      padding: 16px;
      background: rgba(23, 33, 26, 0.08);
      min-height: 180px;
    }
    @media (max-width: 1080px) {
      .grid, .ask-grid { grid-template-columns: 1fr; }
      .hero { align-items: start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/app.js"></script>
</body>
</html>
