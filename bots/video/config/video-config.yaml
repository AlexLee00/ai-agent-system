# 비디오팀 설정 파일
# YouTube 공식 권장 + ffprobe 실측 기반 확정 (2026-03-20)
# 참조: bots/video/docs/CLAUDE.md

# 경로
paths:
  sources: /Users/alexlee/projects/ai-agent-system/bots/video/samples
  temp: /Users/alexlee/projects/ai-agent-system/bots/video/temp
  exports: /Users/alexlee/projects/ai-agent-system/bots/video/exports
  capcut_drafts: /Users/alexlee/Movies/CapCut/User Data/Projects/com.lveditor.draft

# CapCutAPI
capcut_api:
  host: http://localhost:9001
  mcp_cwd: /Users/alexlee/projects/CapCutAPI

# n8n 연동
n8n:
  health_url: http://127.0.0.1:5678/healthz
  base_url: http://127.0.0.1:5678
  webhook_path: video-pipeline
  workflow_name: Video Pipeline
  token: ${VIDEO_N8N_TOKEN}

# FFmpeg 렌더링 (YouTube 공식 권장)
ffmpeg:
  # 오디오 정규화
  audio_lufs: -14
  audio_tp: -1
  audio_lra: 20
  audio_bitrate: 384k
  audio_sample_rate: 48000
  audio_channels: 2
  # 비디오 렌더링
  render_width: 2560
  render_height: 1440
  render_fps: 60
  render_bitrate: 24M
  render_preset: medium
  render_profile: high
  render_pixel_format: yuv420p
  render_movflags: +faststart
  render_color_space: bt709

# Whisper STT
whisper:
  provider: openai
  model: whisper-1
  language: ko
  response_format: verbose_json

# 자막 교정 LLM
subtitle_correction:
  llm_provider: openai
  llm_model: gpt-4o-mini
  fallback_provider: google
  fallback_model: gemini-2.5-flash
  max_retries: 2
  temperature: 0.1

# 장면 인덱싱 (AI 싱크 매칭 파이프라인)
scene_indexer:
  interval_sec: 10
  max_frames: 500
  dedup_threshold: 5
  dedup_method: phash
  ocr_lang: eng
  ocr_workers: 2
  llm_batch_size: 8
  llm_model: gpt-4o-mini
  llm_timeout_ms: 15000

# 나레이션 분석
narration_analyzer:
  segment_min_sec: 10
  segment_max_sec: 60
  correct_subtitle: true
  llm_model: gpt-4o-mini
  llm_timeout_ms: 15000
  offline_segment_count_short: 4
  offline_segment_count_medium: 5
  offline_segment_count_long: 6
  offline_segment_count_xlong: 7

# AI 싱크 매칭
sync_matcher:
  keyword_min_overlap: 2
  embedding_threshold: 0.5
  time_reorder_penalty: 0.3
  max_speed_factor: 2.0
  min_speed_factor: 0.5
  unmatched_strategy: hold
  short_source_window_sec: 30
  repeated_window_penalty: 0.2
  pacing_multiplier: 1.15
  pacing_max_extra_sec: 20
  hold_pacing_extra_sec: 12
  low_confidence_pacing_extra_sec: 6
  speed_floor_threshold: 0.55
  speed_floor_pacing_extra_sec: 10
  pacing_total_max_extra_sec: 24

# Phase 3 편집 스텝 제안
step_proposal:
  auto_confirm_threshold: 0.8
  red_required_below: 0.5
  blue_required_below_red: 50
  red_model: gpt-4o-mini
  blue_max_alternatives: 3

# 인트로/아웃트로
intro_outro:
  default_intro_duration_sec: 3
  default_outro_duration_sec: 5
  default_bg_color: black
  default_text_color: white
  default_font_size: 72
  fade_duration_sec: 0.5
  llm_model: gpt-4o-mini
  llm_timeout_ms: 15000
  fallback_enabled: true

# 품질 검증 루프
quality_loop:
  enabled: false
  target_score: 85
  max_iterations: 3
  critic:
    provider: gemini
    model: gemini-2.5-flash
  refiner:
    provider: groq
    model: groq/gpt-oss-20b
  evaluator:
    provider: groq
    model: groq/llama-4-scout-17b-16e-instruct

# 텔레그램
telegram:
  topic_id: null
