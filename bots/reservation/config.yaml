skills:
  - eval-harness        # 예약성공률/정합성 일일 측정
runtime_config:
  browser:
    launchRetries: 3
    launchRetryDelayMs: 2000
    navigationTimeoutMs: 30000
    pickkoProtocolTimeoutMs: 180000
  naverMonitor:
    maxRetries: 5
    errorTrackerThreshold: 3
    staleConfirmCount: 5
    staleMinElapsedMs: 600000
    staleExpireMs: 1800000
    verifyBeforeUnresolvedReport: true
    verifyBeforeUnresolvedReportTimeoutMs: 240000
  kioskMonitor:
    errorTrackerThreshold: 3
    customerOperationCooldownMs: 30000
