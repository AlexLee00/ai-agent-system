<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스카팀 예약 현황 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif; background: #0f1117; color: #e8eaed; min-height: 100vh; padding: 20px; }
  h1 { font-size: 1.4rem; color: #4fc3f7; margin-bottom: 4px; }
  .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
  .card { background: #1e2130; border-radius: 10px; padding: 18px; }
  .card-title { font-size: 0.85rem; color: #90caf9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
  .stat-big { font-size: 2.2rem; font-weight: 700; color: #fff; }
  .stat-sub { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { color: #90caf9; text-align: left; padding: 6px 8px; border-bottom: 1px solid #2d3250; font-weight: 500; }
  td { padding: 6px 8px; border-bottom: 1px solid #1a1e2e; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
  .badge-confirmed { background: #1a3a2a; color: #4caf50; }
  .badge-pending   { background: #2a2a1a; color: #ffb74d; }
  .badge-completed { background: #1a1a3a; color: #7986cb; }
  .badge-alert-warn { background: #3a2a1a; color: #ff9800; }
  .badge-alert-err  { background: #3a1a1a; color: #ef5350; }
  .empty { color: #555; font-size: 0.85rem; padding: 12px 0; }
  .refresh-info { font-size: 0.75rem; color: #555; margin-top: 20px; text-align: right; }
  .alert-item { padding: 8px 0; border-bottom: 1px solid #1a1e2e; }
  .alert-item:last-child { border-bottom: none; }
  .alert-title { font-size: 0.85rem; font-weight: 600; color: #ff9800; }
  .alert-msg { font-size: 0.78rem; color: #aaa; margin-top: 2px; }
  .alert-time { font-size: 0.72rem; color: #666; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot-ok { background: #4caf50; }
  .dot-warn { background: #ff9800; }
  .loading { color: #555; }
  #last-updated { color: #666; font-size: 0.78rem; }
</style>
</head>
<body>
<h1>📅 스카팀 실시간 대시보드</h1>
<div class="subtitle">스터디카페 예약 현황 · 5분마다 자동 갱신 · <span id="last-updated">로딩 중...</span></div>

<div class="grid" id="main-grid">
  <div class="card"><div class="loading">데이터 로딩 중...</div></div>
</div>

<div class="refresh-info">다음 갱신: <span id="next-refresh">—</span></div>

<script>
const API = '/api/today';
const REFRESH_MS = 5 * 60 * 1000; // 5분

function statusBadge(status) {
  const map = {
    confirmed: ['confirmed', '확정'],
    pending:   ['pending',   '대기'],
    completed: ['completed', '완료'],
  };
  const [cls, label] = map[status] || ['pending', status];
  return `<span class="badge badge-${cls}">${label}</span>`;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatAmount(n) {
  return Number(n || 0).toLocaleString('ko-KR') + '원';
}

function render(data) {
  const grid = document.getElementById('main-grid');
  const alertCount = data.alerts?.length || 0;
  const dotClass = alertCount > 0 ? 'dot-warn' : 'dot-ok';

  // 1. 오늘 요약 카드
  const summaryCard = `
    <div class="card">
      <div class="card-title">📊 오늘 현황 · ${data.date}</div>
      <div class="stat-big">${formatAmount(data.summary?.total_amount)}</div>
      <div class="stat-sub">입장 ${data.summary?.entries_count || 0}건</div>
      <div style="margin-top:14px; font-size:0.85rem; color:#aaa;">
        <span class="status-dot ${dotClass}"></span>
        예약 ${data.total_reserved}건 · 알람 ${alertCount}건
      </div>
    </div>`;

  // 2. 예약 현황 카드
  let reservationRows = '';
  if (data.reservations?.length > 0) {
    reservationRows = data.reservations.map(r =>
      `<tr>
        <td>${r.start_time}~${r.end_time}</td>
        <td>${r.room || '-'}</td>
        <td>${statusBadge(r.status)}</td>
      </tr>`
    ).join('');
  } else {
    reservationRows = `<tr><td colspan="3" class="empty">예약 없음</td></tr>`;
  }
  const reservationCard = `
    <div class="card">
      <div class="card-title">🗓 오늘 예약 (${data.total_reserved}건)</div>
      <table>
        <thead><tr><th>시간</th><th>룸</th><th>상태</th></tr></thead>
        <tbody>${reservationRows}</tbody>
      </table>
    </div>`;

  // 3. 방별 현황 카드
  const roomSummary = data.room_summary || {};
  const roomKeys = Object.keys(roomSummary);
  let roomRows = roomKeys.length > 0
    ? roomKeys.map(k => `<tr><td>${k}</td><td>${roomSummary[k]}건</td></tr>`).join('')
    : `<tr><td colspan="2" class="empty">데이터 없음</td></tr>`;
  const roomCard = `
    <div class="card">
      <div class="card-title">🏠 룸별 예약 현황</div>
      <table>
        <thead><tr><th>룸</th><th>예약 수</th></tr></thead>
        <tbody>${roomRows}</tbody>
      </table>
    </div>`;

  // 4. 알람 카드
  let alertItems = '';
  if (data.alerts?.length > 0) {
    alertItems = data.alerts.map(a => `
      <div class="alert-item">
        <div class="alert-title">⚠️ ${a.title || a.type || '알람'}</div>
        <div class="alert-msg">${(a.message || '').slice(0, 100)}</div>
        <div class="alert-time">${formatTime(a.timestamp)}</div>
      </div>`).join('');
  } else {
    alertItems = '<div class="empty">✅ 미해결 알람 없음</div>';
  }
  const alertCard = `
    <div class="card">
      <div class="card-title">🔔 미해결 알람 (${alertCount}건)</div>
      ${alertItems}
    </div>`;

  grid.innerHTML = summaryCard + reservationCard + roomCard + alertCard;

  document.getElementById('last-updated').textContent =
    '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR');
}

async function fetchAndRender() {
  try {
    const resp = await fetch(API);
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('main-grid').innerHTML =
      `<div class="card"><div style="color:#ef5350">❌ 데이터 조회 실패: ${e.message}</div></div>`;
  }
}

function updateCountdown() {
  const el = document.getElementById('next-refresh');
  let remaining = REFRESH_MS;
  clearInterval(window._countdown);
  window._countdown = setInterval(() => {
    remaining -= 1000;
    if (remaining <= 0) {
      fetchAndRender();
      remaining = REFRESH_MS;
    }
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    el.textContent = `${m}분 ${s}초`;
  }, 1000);
}

// 초기 로드
fetchAndRender();
updateCountdown();
</script>
</body>
</html>
