<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0E1116">
  <title>AI OS Ops Console</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand"><span>AI</span> <b>OS</b></div>
      <div class="status-pill"><span id="statusDot" class="dot"></span><span id="statusText">연결 중</span></div>
      <time id="clock">--:--</time>
    </header>

    <section class="highlight-card">
      <p class="eyebrow">오늘의 하이라이트</p>
      <ul id="highlights">
        <li>관제 데이터를 불러오는 중입니다.</li>
      </ul>
    </section>

    <section class="team-section">
      <div class="section-head">
        <h1>팀 그리드</h1>
        <span id="generatedAt">read-only</span>
      </div>
      <div id="teamGrid" class="team-grid"></div>
    </section>

    <section class="town-section">
      <div class="section-head">
        <h2>타운스퀘어</h2>
        <span>SSE live</span>
      </div>
      <div id="townList" class="town-list"></div>
    </section>
  </main>

  <nav class="bottom-tabs" aria-label="OPS Console tabs">
    <button class="active">▦<span>홈</span></button>
    <button>🗣<span>타운</span></button>
    <button>⚙<span>게이트</span></button>
    <button>🌉<span>브리지</span></button>
    <button>☰<span>설정</span></button>
  </nav>

  <script src="/app.js" defer></script>
</body>
</html>
