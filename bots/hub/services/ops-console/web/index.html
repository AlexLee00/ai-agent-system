<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0E1116">
  <title>AI OS Ops Console</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand"><span>AI</span> <b>OS</b></div>
      <div class="status-pill"><span id="statusDot" class="dot"></span><span id="statusText">연결 중</span></div>
      <time id="clock">--:--</time>
    </header>

    <section data-panel="home">
      <section class="highlight-card">
        <p class="eyebrow">오늘의 하이라이트</p>
        <ul id="highlights">
          <li>관제 데이터를 불러오는 중입니다.</li>
        </ul>
      </section>

      <section class="team-section">
        <div class="section-head">
          <h1>팀 그리드</h1>
          <span id="generatedAt">read-only</span>
        </div>
        <div id="teamGrid" class="team-grid"></div>
      </section>
    </section>

    <section class="town-section" data-panel="town" hidden>
      <div class="section-head">
        <h2>타운스퀘어</h2>
        <span>SSE live</span>
      </div>
      <div id="townList" class="town-list"></div>
    </section>

    <section class="bridge-section" data-panel="bridge" hidden>
      <div class="section-head">
        <h2>브리지 보드</h2>
        <span id="bridgeCount">read-only</span>
      </div>
      <div id="bridgeList" class="bridge-list"></div>
      <pre id="bridgeDetail" class="detail-card">브리지 큐를 불러오는 중입니다.</pre>
    </section>

    <section class="settings-section" data-panel="settings" hidden>
      <div class="section-head">
        <h2>설정</h2>
        <span>PWA</span>
      </div>
      <article class="settings-card">
        <p class="eyebrow">Critical Push</p>
        <p>PROTECTED 중단, 브리지 검증 실패/완료, 루나 guard 청산/손실한도, 스카 매출 장애만 푸시합니다.</p>
        <button id="pushButton" class="primary-button" type="button">이 기기에서 푸시 구독</button>
        <small id="pushStatus">마스터가 VAPID 환경값을 설정한 뒤 활성화됩니다.</small>
      </article>
    </section>
  </main>

  <nav class="bottom-tabs" aria-label="OPS Console tabs">
    <button class="active" data-tab="home">▦<span>홈</span></button>
    <button data-tab="town">🗣<span>타운</span></button>
    <button data-tab="bridge">🌉<span>브리지</span></button>
    <button data-tab="settings">☰<span>설정</span></button>
  </nav>

  <script src="/app.js" defer></script>
</body>
</html>
