name: 클로드팀 품질 검사 + 라이트

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 품질 검사 통합 (리뷰어+가디언+빌더 → 1건 발송)
        run: node bots/claude/src/quality-report.js
        continue-on-error: true

      - name: 라이트 — 문서 동기화 (push 모드)
        run: node bots/orchestrator/src/write.js --mode=push
        continue-on-error: true
