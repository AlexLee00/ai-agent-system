name: CI — Lint & Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Syntax check (changed JS files)
        run: |
          echo "=== JS Syntax Check ==="
          ERRORS=0
          find bots packages -name "*.js" -not -path "*/node_modules/*" | while read f; do
            node --check "$f" 2>/dev/null || { echo "❌ $f"; ERRORS=$((ERRORS+1)); }
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS files failed syntax check"
            exit 1
          fi
          echo "✅ All files passed"

      - name: Check for secrets in code
        run: |
          echo "=== Secret Scan ==="
          if grep -rn "sk-ant-api03-[a-zA-Z0-9_-]\{20,\}\|gsk_[a-zA-Z0-9]\{30,\}" \
            --include="*.js" --include="*.json" --include="*.yaml" --include="*.plist" \
            . | grep -v node_modules | grep -v "example\|YOUR_KEY"; then
            echo "❌ Secrets detected in code!"
            exit 1
          fi
          echo "✅ No secrets found"

  deploy:
    name: 운영 배포 (맥 스튜디오)
    needs: lint-and-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    environment: production
    env:
      PROJECT_ROOT: /Users/alexlee/projects/ai-agent-system

    steps:
      - name: 코드 동기화
        run: |
          cd "$PROJECT_ROOT"
          git pull origin main

      - name: 의존성 갱신 확인
        run: |
          cd "$PROJECT_ROOT"
          if git diff --name-only HEAD~1 HEAD | grep -qE "package\.json|package-lock\.json"; then
            echo "📦 package.json 변경 감지 — npm install 실행"
            npm install --production
          else
            echo "✅ 의존성 변경 없음"
          fi

      - name: 덱스터 체크섬 자동 갱신
        run: |
          cd "$PROJECT_ROOT"
          node bots/claude/src/dexter.js --update-checksums || true

      - name: 변경된 팀만 재시작
        run: |
          cd "$PROJECT_ROOT"
          bash scripts/smart-restart.sh

      - name: 배포 후 헬스체크 (실패해도 배포는 성공)
        run: |
          sleep 15
          cd "$PROJECT_ROOT"
          node bots/claude/scripts/health-check.js --post-deploy --json || true
