name: CI — Lint & Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript strict check
        run: npm run typecheck:strict

      - name: Syntax check (changed JS files)
        run: |
          echo "=== JS Syntax Check ==="
          ERRORS=0
          find bots packages -name "*.js" -not -path "*/node_modules/*" | while read f; do
            node --check "$f" 2>/dev/null || { echo "❌ $f"; ERRORS=$((ERRORS+1)); }
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS files failed syntax check"
            exit 1
          fi
          echo "✅ All files passed"

      - name: Check for secrets in code
        run: ./node_modules/.bin/tsx bots/hub/scripts/secret-leak-smoke.ts

  deploy:
    name: 운영 배포 (맥 스튜디오)
    needs: lint-and-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    environment: production
    env:
      PROJECT_ROOT: /Users/alexlee/projects/ai-agent-system

    steps:
      - name: 배포 스크립트 실행
        run: |
          chmod +x scripts/deploy.sh
          PROJECT_ROOT="$PROJECT_ROOT" ./scripts/deploy.sh
